<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e3a5f, #0f4c75);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #22d3ee;
      letter-spacing: 0.5px;
    }
    header h1 span { color: #e2e8f0; font-weight: 400; font-size: 1rem; margin-left: 8px; }

    #healthBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      background: #1e293b;
      border: 1px solid #334155;
      transition: all 0.3s;
    }
    #healthBadge.healthy { border-color: #10b981; color: #10b981; }
    #healthBadge.unhealthy { border-color: #ef4444; color: #ef4444; }
    #healthBadge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stat Cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: #22d3ee; }
    .stat-card .value {
      font-size: 2.4rem;
      font-weight: 700;
      color: #22d3ee;
      line-height: 1;
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      background: #1e293b;
      color: #94a3b8;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #22d3ee; border-bottom-color: #22d3ee; background: #243449; }
    .tab-btn:hover:not(.active) { color: #e2e8f0; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Panel ── */
    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0 12px 12px 12px;
      padding: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      background: #0f172a;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: #22d3ee; }
    .toolbar input { width: 220px; }
    .toolbar select { min-width: 140px; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #22d3ee; color: #0f172a; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-warning { background: #f59e0b; color: #0f172a; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

    .toolbar .ml-auto { margin-left: auto; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: #0f172a;
      color: #94a3b8;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.5px;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    td { padding: 11px 12px; border-top: 1px solid #1e293b; }
    tr:hover td { background: #243449; }
    .actions { display: flex; gap: 6px; }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-available { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid #10b981; }
    .badge-checked   { background: rgba(239,68,68,0.15);  color: #ef4444;  border: 1px solid #ef4444; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #475569;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { color: #22d3ee; font-size: 1.1rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #22d3ee; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── Toast ── */
    #toastContainer {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 2000;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
      border-left: 4px solid;
    }
    .toast.success { background: #0d2b22; color: #10b981; border-color: #10b981; }
    .toast.error   { background: #2b0d0d; color: #ef4444; border-color: #ef4444; }
    .toast.info    { background: #0d1f2b; color: #22d3ee; border-color: #22d3ee; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateX(120%); } }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #334155;
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>📚 Library Management System <span>v2.0</span></h1>
  <div id="healthBadge"><span class="dot"></span> Checking…</div>
</header>

<!-- Main Content -->
<main>

  <!-- Stat Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="value" id="statTotal">—</div>
      <div class="label">Total Books</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statAvailable" style="color:#10b981">—</div>
      <div class="label">Available</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statCheckedOut" style="color:#ef4444">—</div>
      <div class="label">Checked Out</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statBorrows" style="color:#f59e0b">—</div>
      <div class="label">Total Borrows</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('books', this)">📖 Books</button>
    <button class="tab-btn" onclick="switchTab('history', this)">🕑 Borrow History</button>
  </div>

  <!-- Books Tab -->
  <div id="tab-books" class="tab-panel active">
    <div class="panel">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="🔍 Search by title or author…" oninput="filterBooks()" />
        <select id="genreFilter" onchange="filterBooks()">
          <option value="">All Genres</option>
        </select>
        <select id="availFilter" onchange="filterBooks()">
          <option value="">All Status</option>
          <option value="available">Available</option>
          <option value="checked">Checked Out</option>
        </select>
        <div class="ml-auto" style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="openAddModal()">＋ Add Book</button>
          <button class="btn btn-secondary" onclick="loadAll()">↻ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Title</th><th>Author</th><th>Genre</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="booksBody"></tbody>
        </table>
        <div id="booksEmpty" class="empty-state" style="display:none">
          <div class="icon">📭</div>
          <div>No books found</div>
        </div>
      </div>
    </div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-panel">
    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Book ID</th><th>Title</th><th>Borrower</th><th>Borrowed At</th><th>Returned At</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
        <div id="historyEmpty" class="empty-state" style="display:none">
          <div class="icon">🕑</div>
          <div>No borrow history yet</div>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Add Book Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>＋ Add New Book</h3>
    <div class="form-group">
      <label>Title *</label>
      <input id="newTitle" type="text" placeholder="e.g. Clean Code" />
    </div>
    <div class="form-group">
      <label>Author *</label>
      <input id="newAuthor" type="text" placeholder="e.g. Robert C. Martin" />
    </div>
    <div class="form-group">
      <label>Genre *</label>
      <input id="newGenre" type="text" placeholder="e.g. Technology" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addBook()">Add Book</button>
    </div>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <h3>📤 Checkout Book</h3>
    <p style="color:#94a3b8;font-size:0.88rem;margin-bottom:16px" id="checkoutBookTitle"></p>
    <div class="form-group">
      <label>Borrower Name *</label>
      <input id="borrowerName" type="text" placeholder="e.g. John Doe" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('checkoutModal')">Cancel</button>
      <button class="btn btn-success" onclick="confirmCheckout()">Checkout</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
  // ── State ──
  let allBooks = [];
  let checkoutBookId = null;

  // ── Init ──
  document.addEventListener('DOMContentLoaded', loadAll);

  async function loadAll() {
    await Promise.all([checkHealth(), loadStats(), loadBooks(), loadHistory()]);
  }

  // ── Health ──
  async function checkHealth() {
    try {
      const res = await fetch('/health');
      const data = await res.json();
      const badge = document.getElementById('healthBadge');
      const ok = res.ok && data.status === 'healthy';
      badge.className = ok ? 'healthy' : 'unhealthy';
      badge.innerHTML = `<span class="dot"></span> ${ok ? 'API Healthy' : 'API Unhealthy'}`;
    } catch {
      const badge = document.getElementById('healthBadge');
      badge.className = 'unhealthy';
      badge.innerHTML = '<span class="dot"></span> Unreachable';
    }
  }

  // ── Stats ──
  async function loadStats() {
    try {
      const res = await fetch('/books/stats');
      const data = await res.json();
      const s = data.data || {};
      document.getElementById('statTotal').textContent     = s.totalBooks       ?? '—';
      document.getElementById('statAvailable').textContent = s.availableBooks   ?? '—';
      document.getElementById('statCheckedOut').textContent= s.checkedOutBooks  ?? '—';
      document.getElementById('statBorrows').textContent   = s.totalBorrows     ?? '—';
    } catch {
      // silently ignore stats error
    }
  }

  // ── Books ──
  async function loadBooks() {
    try {
      const res = await fetch('/books?size=100');
      const data = await res.json();
      allBooks = data.data || [];
      populateGenreFilter();
      renderBooks(allBooks);
    } catch (e) {
      showToast('Failed to load books: ' + e.message, 'error');
    }
  }

  function populateGenreFilter() {
    const genres = [...new Set(allBooks.map(b => b.genre ?? '').filter(g => g))].sort();
    const sel = document.getElementById('genreFilter');
    const current = sel.value;
    sel.innerHTML = '<option value="">All Genres</option>';
    genres.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      if (g === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function filterBooks() {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const genre = document.getElementById('genreFilter').value;
    const avail = document.getElementById('availFilter').value;
    const filtered = allBooks.filter(b => {
      const matchSearch = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
      const matchGenre  = !genre || b.genre === genre;
      const matchAvail  = !avail
        || (avail === 'available' && b.available)
        || (avail === 'checked'   && !b.available);
      return matchSearch && matchGenre && matchAvail;
    });
    renderBooks(filtered);
  }

  function renderBooks(books) {
    const tbody = document.getElementById('booksBody');
    const empty = document.getElementById('booksEmpty');
    if (!books.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = books.map(b => `
      <tr>
        <td style="color:#94a3b8">${b.id}</td>
        <td style="font-weight:600">${esc(b.title)}</td>
        <td>${esc(b.author)}</td>
        <td><span style="color:#94a3b8">${esc(b.genre)}</span></td>
        <td>
          ${b.available
            ? '<span class="badge badge-available">✓ Available</span>'
            : '<span class="badge badge-checked">✗ Checked Out</span>'}
        </td>
        <td>
          <div class="actions">
            ${b.available
              ? `<button class="btn btn-sm btn-success" onclick="openCheckoutModal(${b.id})">Checkout</button>`
              : `<button class="btn btn-sm btn-warning" onclick="returnBook(${b.id})">Return</button>`}
            <button class="btn btn-sm btn-danger" onclick="deleteBook(${b.id})">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  }

  // ── Add Book ──
  function openAddModal() {
    document.getElementById('newTitle').value = '';
    document.getElementById('newAuthor').value = '';
    document.getElementById('newGenre').value = '';
    openModal('addModal');
  }

  async function addBook() {
    const title  = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const genre  = document.getElementById('newGenre').value.trim();
    if (!title || !author || !genre) { showToast('All fields are required.', 'error'); return; }
    try {
      const res = await fetch('/books', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author, genre })
      });
      const data = await res.json();
      if (res.ok) {
        closeModal('addModal');
        showToast('Book added successfully!', 'success');
        await loadAll();
      } else {
        showToast(data.message || 'Failed to add book.', 'error');
      }
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  // ── Delete ──
  async function deleteBook(id) {
    if (!confirm('Delete this book?')) return;
    try {
      const res = await fetch(`/books/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (res.ok) {
        showToast('Book deleted.', 'success');
        await loadAll();
      } else {
        showToast(data.message || 'Failed to delete.', 'error');
      }
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  // ── Checkout ──
  function openCheckoutModal(id) {
    checkoutBookId = id;
    const book = allBooks.find(b => b.id === id);
    document.getElementById('checkoutBookTitle').textContent = book ? \
